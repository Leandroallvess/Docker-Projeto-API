version: "3.8"

services:
  backend:
    build: ./backend
    container_name: api-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/projetodb
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

  seed:
    build: ./backend
    container_name: seed-runner
    command: ["npm", "run", "seed"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/projetodb
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projetodb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
